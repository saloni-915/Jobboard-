{% extends 'base.html' %}

{% block title %}Post a Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="mb-4">📝 Post a New Job</h2>

                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">
                        Post Job
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
