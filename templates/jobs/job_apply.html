{% extends 'base.html' %}

{% block title %}Apply — {{ job.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="mb-1">Apply for {{ job.title }}</h3>
                <p class="text-muted mb-4">🏢 {{ job.company.name }}</p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                {{ field.label }}
                            </label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">
                                    {{ field.errors.0 }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-success w-100">
                        Submit Application
                    </button>
                    <a href="{% url 'job_detail' job.pk %}"
                       class="btn btn-outline-secondary w-100 mt-2">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
