{% extends 'base.html' %}

{% block title %}Delete Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4 text-center">
                <h3>Delete this job?</h3>
                <p class="text-muted">{{ job.title }} — {{ job.company.name }}</p>
                <p class="text-danger">Warning: This action is permanent and cannot be undone.</p>

                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        Yes, Delete
                    </button>
                    <a href="{% url 'my_posts' %}" class="btn btn-outline-secondary ms-2">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
