{% extends 'base.html' %}

{% block title %}Setup Company{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="mb-4">🏢 Setup Your Company</h2>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label">{{ field.label }}</label>
                            {{ field }}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">
                        Create Company
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
