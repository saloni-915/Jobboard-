{% for job in jobs %}

<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between">
            <div>
                <h5 class="card-title">{{ job.title }}</h5>
                <p class="text-muted">
                     {{ job.company.name }} |
                    📍 {{ job.location }} |
                     {{ job.get_job_type_display }}
                </p>
                <p>{{ job.description|truncatewords:20 }}</p>
            </div>
            {% if job.company.logo %}
            <a href="{% url 'company_profile_detail' job.company.id %}">
                <img src="{{ job.company.logo.url }}"
                     width="60" height="60"
                     style="object-fit:contain;">
            </a>
            {% endif %}
        </div>
        <a href="{% url 'job_detail' job.pk %}"
           class="btn btn-primary btn-sm">
            View Details
        </a>
    </div>
</div>

{% empty %}
    <p class="text-muted">No jobs found!</p>
{% endfor %}
