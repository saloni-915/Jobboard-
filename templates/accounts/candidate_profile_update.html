{% extends 'base.html' %}

{% block title %}Profile Update{% endblock %}

{% block content %}

        <!-- Update Form Card -->
        <div class="card shadow">
            <div class="card-body p-4">
                <h5 class="mb-4">Update Profile</h5>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Basic Info -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Bio</label>
                            <textarea name="bio"
                                      class="form-control"
                                      rows="3">{{ profile.bio }}</textarea>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   value="{{ profile.phone }}">
                        </div>
                    </div>

                    <!-- Profile Picture -->
                    <div class="mb-3">
                         <label class="form-label">Profile Picture</label>

    {% if profile.profile_picture %}
        <div class="mb-2">
            <img src="{{ profile.profile_picture.url }}"
                 width="120"
                 class="img-thumbnail">

            <div class="form-check mt-2">
                <input class="form-check-input"
                       type="checkbox"
                       name="remove_profile_picture"
                       id="removeProfilePicture">

                <label class="form-check-label"
                       for="removeProfilePicture">
                    Remove Profile Picture
                </label>
            </div>
        </div>
    {% endif %}

    <input type="file"
           name="profile_picture"
           class="form-control"
           accept="image/*">
                    </div>
 

                    <!-- Skills — baad mein add karenge -->
                     <div class="mb-3">
    <label class="form-label">Skills</label>
    <input
        type="text"
        name="skills"
        class="form-control"
        value="{{ profile.skills }}"
        placeholder="Python, Django, MySQL, Financial Analysis, Excel, Healthcare Management"
    >
    <small class="text-muted">
        Separate skills with commas.
    </small>
</div>
                    <!-- Resume — baad mein add karenge -->
                     <div class="mb-3">
                        <label class="form-label">Resume (PDF)</label>
                        <input type="file"
                               name="resume"
                               class="form-control"
                               accept=".pdf">
                    </div> 

                    <!-- LinkedIn, GitHub — baad mein add karenge -->
                   <div class="mb-3">
                        <label class="form-label">LinkedIn URL</label>
                        <input type="url"
                               name="linkedin_url"
                               class="form-control"
                               value="{{ profile.linkedin_url }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">GitHub URL</label>
                        <input type="url"
                               name="github_url"
                               class="form-control"
                               value="{{ profile.github_url }}">
                    </div> 

                    <button type="submit" class="btn btn-success w-100">
                        Save
                    </button>
                </form>
            </div>
        </div>

    </div>
  
{% endblock %}
